<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/playground/">
  <title>aaro — Playground</title>
  <meta name="description" content="AARO Playground: Interactive architectural algorithm demos.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%230D0D0C'/%3E%3Cstyle%3Etext%7Bfont-family:system-ui,-apple-system,sans-serif;font-weight:800;font-size:26px;fill:%23EDE8E0%7D%3C/style%3E%3Ctext text-anchor='middle' x='22' y='26'%3Ea%3C/text%3E%3Ctext text-anchor='middle' x='42' y='26'%3Ea%3C/text%3E%3Ctext text-anchor='middle' x='22' y='48'%3Er%3C/text%3E%3Ctext text-anchor='middle' x='42' y='48'%3Eo%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('aaro-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <header class="pg-header">
    <a href="/" class="pg-header__logo">aaro</a>
    <span class="pg-header__title">Playground</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z"/></svg>
    </button>
    <a href="/" class="pg-header__back">&larr; Home</a>
  </header>

  <main class="pg-grid" id="pgGrid"></main>

  <script type="module">
    // Theme toggle
    document.getElementById('themeToggle')?.addEventListener('click', () => {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      if (next === 'dark') html.removeAttribute('data-theme');
      else html.setAttribute('data-theme', next);
      localStorage.setItem('aaro-theme', next);
    });

    // Cursor glow
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      if (glow) { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; }
    });

    const VALID_ID = /^[a-z][a-z0-9-]*$/;

    function escapeHTML(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    // Build control elements from registry entry (DOM-based, no innerHTML)
    function appendControls(container, controls) {
      if (!controls || !controls.length) return;
      for (const ctrl of controls) {
        if (!VALID_ID.test(ctrl.inputId)) continue;
        if (ctrl.type === 'file') {
          const label = document.createElement('label');
          label.className = 'pg-upload-btn';
          const input = document.createElement('input');
          input.type = 'file';
          input.id = ctrl.inputId;
          input.accept = ctrl.accept || 'image/*';
          input.hidden = true;
          label.appendChild(input);
          label.appendChild(document.createTextNode(ctrl.label || 'File'));
          container.appendChild(label);
        } else if (ctrl.type === 'button') {
          const btn = document.createElement('button');
          btn.className = 'pg-action-btn';
          btn.id = ctrl.inputId;
          btn.textContent = ctrl.label || 'Run';
          container.appendChild(btn);
        } else if (ctrl.type === 'range') {
          const span = document.createElement('span');
          span.className = 'pg-ctrl';
          const lbl = document.createElement('label');
          lbl.textContent = ctrl.label || '';
          span.appendChild(lbl);
          const input = document.createElement('input');
          input.type = 'range';
          input.id = ctrl.inputId;
          input.min = ctrl.min; input.max = ctrl.max; input.value = ctrl.value;
          span.appendChild(input);
          container.appendChild(span);
        }
      }
    }

    // Build a cell article element from a registry entry (DOM-based)
    function buildCell(demo) {
      const article = document.createElement('article');
      article.className = 'pg-cell';
      article.id = `demo-${demo.id}`;

      const label = document.createElement('div');
      label.className = 'pg-cell__label';
      label.textContent = demo.title + ' ';
      const labelKr = document.createElement('span');
      labelKr.className = 'pg-cell__label-kr';
      labelKr.textContent = demo.titleKr;
      label.appendChild(labelKr);
      article.appendChild(label);

      const canvasWrap = document.createElement('div');
      canvasWrap.className = 'pg-cell__canvas-wrap';
      canvasWrap.appendChild(document.createElement('canvas'));
      article.appendChild(canvasWrap);

      const metrics = document.createElement('div');
      metrics.className = 'pg-cell__metrics';
      article.appendChild(metrics);

      const hint = document.createElement('div');
      hint.className = 'pg-cell__hint';
      // hint may contain intentional HTML (accent spans, &rarr;)
      hint.innerHTML = demo.hint || '';
      appendControls(hint, demo.controls);
      article.appendChild(hint);

      return article;
    }

    // Resolve a relative path against <base href>, working around
    // Safari where dynamic import() ignores the <base> tag.
    function resolveURL(rel) {
      return new URL(rel, document.baseURI).href;
    }

    // Load registry and init demos
    async function boot() {
      const grid = document.getElementById('pgGrid');
      const registry = await fetch(resolveURL('demos/registry.json')).then(r => r.json());

      for (const demo of registry) {
        // Validate demo ID and script path
        if (!VALID_ID.test(demo.id)) continue;
        const expectedScript = `demos/${demo.id}/index.js`;
        if (demo.script !== expectedScript) continue;

        const cell = buildCell(demo);
        grid.appendChild(cell);

        import(resolveURL(demo.script)).then(mod => {
          if (mod.init) mod.init(cell);
        }).catch(err => {
          console.error(`Failed to load demo "${demo.id}":`, err);
          cell.querySelector('.pg-cell__metrics').textContent = 'Failed to load';
        });
      }
    }

    boot();
  </script>
</body>
</html>
