<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aaro — Playground</title>
  <meta name="description" content="AARO Playground: Interactive architectural algorithm demos.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%230D0D0C'/%3E%3Cstyle%3Etext%7Bfont-family:system-ui,-apple-system,sans-serif;font-weight:800;font-size:26px;fill:%23EDE8E0%7D%3C/style%3E%3Ctext text-anchor='middle' x='22' y='26'%3Ea%3C/text%3E%3Ctext text-anchor='middle' x='42' y='26'%3Ea%3C/text%3E%3Ctext text-anchor='middle' x='22' y='48'%3Er%3C/text%3E%3Ctext text-anchor='middle' x='42' y='48'%3Eo%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <header class="pg-header">
    <a href="/" class="pg-header__logo">aaro</a>
    <span class="pg-header__title">Playground</span>
    <a href="/" class="pg-header__back">&larr; Home</a>
  </header>

  <main class="pg-grid" id="pgGrid"></main>

  <script type="module">
    // Cursor glow
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      if (glow) { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; }
    });

    // Build control HTML from registry entry
    function buildControlsHTML(controls) {
      if (!controls || !controls.length) return '';
      return controls.map(ctrl => {
        if (ctrl.type === 'file') {
          return `<label class="pg-upload-btn"><input type="file" id="${ctrl.inputId}" accept="${ctrl.accept}" hidden>${ctrl.label}</label>`;
        }
        if (ctrl.type === 'range') {
          return `<span class="pg-ctrl"><label>${ctrl.label}</label><input type="range" id="${ctrl.inputId}" min="${ctrl.min}" max="${ctrl.max}" value="${ctrl.value}"></span>`;
        }
        return '';
      }).join('\n        ');
    }

    // Build a cell article element from a registry entry
    function buildCell(demo) {
      const article = document.createElement('article');
      article.className = 'pg-cell';
      article.id = `demo-${demo.id}`;
      article.innerHTML = `
      <div class="pg-cell__label">${demo.title} <span class="pg-cell__label-kr">${demo.titleKr}</span></div>
      <div class="pg-cell__canvas-wrap"><canvas></canvas></div>
      <div class="pg-cell__metrics"></div>
      <div class="pg-cell__hint">
        ${demo.hint}
        ${buildControlsHTML(demo.controls)}
      </div>`;
      return article;
    }

    // Load registry and init demos
    async function boot() {
      const grid = document.getElementById('pgGrid');
      const registry = await fetch('demos/registry.json').then(r => r.json());

      for (const demo of registry) {
        const cell = buildCell(demo);
        grid.appendChild(cell);

        // Dynamic import — only loads JS when needed
        import(`./${demo.script}`).then(mod => {
          if (mod.init) mod.init(cell);
        }).catch(err => {
          console.error(`Failed to load demo "${demo.id}":`, err);
          cell.querySelector('.pg-cell__metrics').textContent = 'Failed to load';
        });
      }
    }

    boot();
  </script>
</body>
</html>
