<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications — aaro</title>
  <meta name="description" content="AARO — News, Writings, and Research Notes.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%230D0D0C'/%3E%3Cstyle%3Etext%7Bfont-family:system-ui,-apple-system,sans-serif;font-weight:800;font-size:26px;fill:%23EDE8E0%7D%3C/style%3E%3Ctext text-anchor='middle' x='22' y='26'%3Ea%3C/text%3E%3Ctext text-anchor='middle' x='42' y='26'%3Ea%3C/text%3E%3Ctext text-anchor='middle' x='22' y='48'%3Er%3C/text%3E%3Ctext text-anchor='middle' x='42' y='48'%3Eo%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:     #0D0D0C;
      --ink-90:  #1A1A18;
      --ink-80:  #2E2E2A;
      --ink-60:  #5A5A52;
      --ink-40:  #8A8A82;
      --ink-20:  #BFBDB5;
      --ink-10:  #D8D3CB;
      --cream:   #EDE8E0;
      --white:   #F8F6F1;
      --accent:  #C4773C;
      --accent-h:#E8944A;
      --sans: 'DM Sans', 'Noto Sans KR', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--ink);
      color: var(--cream);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    ::selection { background: var(--accent); color: var(--ink); }
    ::-webkit-scrollbar { width: 0; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    /* ── GRAIN OVERLAY ── */
    .grain {
      position: fixed; inset: 0; z-index: 9998; pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ── TYPOGRAPHY ── */
    .t-mega {
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 900; letter-spacing: -0.05em; line-height: 0.9;
    }
    .t-eyebrow {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-40);
    }

    /* ── REVEAL ── */
    .rv {
      opacity: 0; transform: translateY(40px);
      transition: opacity 1.2s var(--ease), transform 1.2s var(--ease);
    }
    .rv.vis { opacity: 1; transform: translateY(0); }
    .rv-d1 { transition-delay: .1s } .rv-d2 { transition-delay: .2s }
    .rv-d3 { transition-delay: .3s } .rv-d4 { transition-delay: .4s }

    /* ── HEADER ── */
    .pub-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px clamp(32px, 5vw, 80px);
      background: rgba(13,13,12,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--ink-80);
    }
    .pub-header__logo {
      font-size: 22px; font-weight: 900; letter-spacing: -0.03em;
      color: var(--cream);
    }
    .pub-header__back {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--ink-40);
      display: inline-flex; align-items: center; gap: 8px;
      transition: color 0.4s;
    }
    .pub-header__back:hover { color: var(--accent); }
    .pub-header__back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── HERO ── */
    .pub-hero {
      padding: clamp(64px, 10vw, 140px) clamp(32px, 5vw, 80px) clamp(40px, 5vw, 60px);
      max-width: 1400px;
    }
    .pub-hero__title {
      text-transform: lowercase; color: var(--cream); margin-top: 20px;
    }
    .pub-hero__title .accent { color: var(--accent); }
    .pub-hero__sub {
      font-family: var(--mono); font-size: 13px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--ink-40);
      margin-top: 28px; max-width: 60ch;
    }

    /* ── FILTER ── */
    .pub-main {
      padding: 0 clamp(32px, 5vw, 80px) clamp(80px, 10vw, 140px);
      max-width: 1400px;
    }
    .pub-filter {
      display: flex; gap: 6px; margin-bottom: 32px; flex-wrap: wrap;
    }
    .pub-filter__btn {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 10px 18px; color: var(--ink-40);
      border: 1px solid var(--ink-80); border-radius: 999px;
      transition: all 0.3s;
    }
    .pub-filter__btn:hover { color: var(--cream); border-color: var(--ink-40); }
    .pub-filter__btn.active {
      color: var(--ink); background: var(--cream); border-color: var(--cream);
    }

    /* ── LIST ── */
    .pub-list { display: flex; flex-direction: column; gap: 0; }
    .pub-item {
      display: grid; grid-template-columns: 90px 1fr 110px; gap: 32px; align-items: baseline;
      padding: 28px 0; border-bottom: 1px solid var(--ink-80);
      transition: background 0.4s, padding 0.4s;
    }
    .pub-item:first-child { border-top: 1.5px solid var(--cream); }
    .pub-item:hover { background: rgba(196,119,60,0.04); padding-left: 12px; padding-right: 12px; }
    .pub-item.hidden { display: none; }
    .pub-item__date {
      font-family: var(--mono); font-size: 12px; color: var(--ink-40);
      letter-spacing: 0.1em; font-weight: 500;
    }
    .pub-item__body { display: flex; flex-direction: column; gap: 6px; }
    .pub-item__title {
      font-size: 17px; font-weight: 600; color: var(--cream); line-height: 1.5;
      transition: color 0.4s;
    }
    .pub-item:hover .pub-item__title { color: var(--accent); }
    .pub-item__meta {
      font-family: var(--mono); font-size: 12px; color: var(--ink-40);
      letter-spacing: 0.05em; line-height: 1.6;
    }
    .pub-item__meta span { color: var(--ink-20); }
    .pub-item__tag {
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap;
      align-self: center;
      padding: 6px 12px; border-radius: 999px;
      border: 1px solid currentColor;
      display: inline-block; justify-self: end;
    }
    .pub-item__tag--writing { color: var(--accent); }
    .pub-item__tag--press   { color: #8BA888; }
    .pub-item__tag--pdf     { color: #C4A574; }
    .pub-item__tag--talk    { color: #9BA3C4; }
    .pub-item__link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--ink-40);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 4px; transition: color 0.4s;
    }
    .pub-item:hover .pub-item__link { color: var(--accent); }
    .pub-item__link svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── EMPTY ── */
    .pub-empty {
      padding: 60px 0; text-align: center;
      color: var(--ink-40); font-family: var(--mono); font-size: 13px;
      letter-spacing: 0.1em; text-transform: uppercase;
      display: none;
    }
    .pub-empty.visible { display: block; }

    /* ── FOOTER ── */
    .pub-footer {
      padding: 48px clamp(32px, 5vw, 80px);
      border-top: 1px solid var(--ink-80);
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-40);
      flex-wrap: wrap; gap: 20px;
    }
    .pub-footer a { transition: color 0.4s; }
    .pub-footer a:hover { color: var(--accent); }
    .pub-footer__links { display: flex; gap: 24px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .pub-item { grid-template-columns: 1fr; gap: 10px; padding: 20px 0; }
      .pub-item:hover { padding-left: 0; padding-right: 0; }
      .pub-item__tag { justify-self: flex-start; align-self: flex-start; }
      .pub-filter { gap: 6px; }
      .pub-filter__btn { padding: 8px 14px; font-size: 10px; }
      .pub-header { padding: 20px; }
      .pub-hero { padding: 60px 20px 40px; }
      .pub-main { padding: 0 20px 80px; }
    }
  </style>
</head>
<body>

  <div class="grain"></div>

  <header class="pub-header">
    <a href="index.html" class="pub-header__logo">aaro</a>
    <a href="index.html" class="pub-header__back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      Back to home
    </a>
  </header>

  <section class="pub-hero">
    <p class="t-eyebrow rv">News &amp; Writings</p>
    <h1 class="t-mega pub-hero__title rv rv-d1">
      press &amp;<br><span class="accent">research notes</span>
    </h1>
    <p class="pub-hero__sub rv rv-d2">
      Articles, interviews, research notes, and papers from AARO — a design lab exploring
      the intersection of architectural judgment and computational reasoning.
    </p>
  </section>

  <main class="pub-main">
    <div class="pub-filter rv rv-d3" id="pubFilter">
      <button class="pub-filter__btn active" data-filter="all">All</button>
      <button class="pub-filter__btn" data-filter="writing">Writings</button>
      <button class="pub-filter__btn" data-filter="press">Press</button>
      <button class="pub-filter__btn" data-filter="pdf">PDF</button>
    </div>

    <div class="pub-list rv rv-d4" id="pubList"></div>

    <div class="pub-empty visible" id="pubEmpty">Coming soon.</div>
  </main>

  <footer class="pub-footer">
    <div>&copy; 2026 AARO. All rights reserved.</div>
    <div class="pub-footer__links">
      <a href="index.html">Home</a>
      <a href="index.html#s6">Contact</a>
      <a href="mailto:architecture.algorithm@gmail.com">Email</a>
    </div>
  </footer>

  <script>
    // ── Reveal ──
    const rvObs = new IntersectionObserver(es => es.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('vis');
    }), { threshold: .08 });
    document.querySelectorAll('.rv').forEach(el => rvObs.observe(el));

    // ── Filter ──
    const pubFilter = document.getElementById('pubFilter');
    const pubItems = document.querySelectorAll('#pubList .pub-item');
    const pubEmpty = document.getElementById('pubEmpty');
    pubFilter.addEventListener('click', e => {
      const btn = e.target.closest('.pub-filter__btn');
      if (!btn) return;
      const f = btn.dataset.filter;
      pubFilter.querySelectorAll('.pub-filter__btn').forEach(b =>
        b.classList.toggle('active', b === btn)
      );
      let visible = 0;
      pubItems.forEach(it => {
        const hide = f !== 'all' && it.dataset.type !== f;
        it.classList.toggle('hidden', hide);
        if (!hide) visible++;
      });
      pubEmpty.classList.toggle('visible', visible === 0);
    });
  </script>

</body>
</html>
