<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,700&amp;family=IBM+Plex+Mono:wght@500');
      .l { font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 92px; fill: #EDE8E0; }
      .tag { font-family: 'IBM Plex Mono', monospace; font-weight: 500; font-size: 10px; fill: #5A5A52; letter-spacing: 0.2em; }
    </style>
  </defs>
  <rect width="800" height="200" fill="#0D0D0C"/>

  <!-- 2x2 logo block -->
  <text class="l" text-anchor="middle" x="68"  y="92">a</text>
  <text class="l" text-anchor="middle" x="164" y="92">a</text>
  <text class="l" text-anchor="middle" x="68"  y="168">r</text>
  <text class="l" text-anchor="middle" x="164" y="168">o</text>

  <!-- Separator -->
  <line x1="236" y1="36" x2="236" y2="164" stroke="#2E2E2A" stroke-width="1"/>

  <!-- Tagline -->
  <text class="tag" x="262" y="96">ARCHITECTURAL ALGORITHM</text>
  <text class="tag" x="262" y="116">RESEARCH OFFICE</text>
</svg>
